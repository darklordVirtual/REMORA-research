name: CI — Deterministic Test Suite

# Minimal CI: runs the full deterministic test suite on every push and PR.
# No API keys, no network access, no cloud resources required.
# For the full quality-gates pipeline (lint, coverage, frontend, replay), see quality-gates.yml.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # 3.14 is the environment pinned in paper/remora_paper.md §16 — the
        # published environment must be CI-tested (2026-07-02 review finding).
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          # causal extra: tests/test_causal.py imports remora.causal.domains,
          # whose loader needs pyyaml — without it, test collection fails.
          # Constraints (-c) pin every resolved dependency to the exact versions
          # in the committed requirements-lock.txt, while the extras still drive
          # WHAT gets installed. The lock file contains editable (-e) and comment
          # lines that pip rejects in a constraints file, so filter them out.
          grep -vE '^-e|^#|file://' requirements-lock.txt > /tmp/constraints.txt
          pip install -e ".[dev,causal,api]" -c /tmp/constraints.txt

      - name: Run deterministic test suite
        # Markers 'live' and 'live_replay_heavy' are excluded by default in
        # pyproject.toml addopts — no API keys or network access required.
        run: python -m pytest tests/ -q

      - name: Verify zero false-accept rate
        # Parse the test output: any false_accept > 0 is a hard stop.
        # This runs the gateway evaluation in-process without external deps.
        run: |
          python - <<'PY'
          import json, pathlib, sys
          candidates = [
              "results/toolcall_blind_v3_results.json",
              "results/false_accept_regression_v1.json",
          ]
          errors = []
          for p in candidates:
              path = pathlib.Path(p)
              if not path.exists():
                  errors.append(f"MISSING artifact: {p}")
                  continue
              data = json.loads(path.read_bytes())
              far = data.get("false_accept_rate", data.get("n_false_accept", None))
              if far is None:
                  errors.append(f"No FAR field in {p}")
                  continue
              if float(far) != 0.0:
                  errors.append(f"FAR > 0 in {p}: {far}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("Zero false-accept gate: PASS")
          PY

  opa-conformance:
    name: OPA/Rego policy conformance (mandatory)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Pinned OPA version — the same version the conformance harness was
      # verified against locally. Bump deliberately, never float `latest`.
      OPA_VERSION: "1.18.2"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # Constraints (-c) = version pinning from requirements-lock.txt; the
          # extras drive what gets installed. Filter out -e/comment lines that
          # pip rejects in a constraints file.
          grep -vE '^-e|^#|file://' requirements-lock.txt > /tmp/constraints.txt
          pip install -e ".[dev,causal,api]" -c /tmp/constraints.txt

      - name: Install pinned OPA binary
        run: |
          curl -sSfL -o /usr/local/bin/opa \
            "https://github.com/open-policy-agent/opa/releases/download/v${OPA_VERSION}/opa_linux_amd64_static"
          # Verify the binary before trusting it. The expected digest comes from
          # the official opa_linux_amd64_static.sha256 release asset for
          # v1.18.2. sha256sum -c exits non-zero on mismatch, failing the job.
          echo "9903e5125ac281104f2c4b7371d10cc3b74a98933743fcbfc174f9bf0ab20de8  /usr/local/bin/opa" | sha256sum -c -
          chmod +x /usr/local/bin/opa
          opa version

      - name: Rego syntax check
        run: opa check datasets/remora_knowledge_v1/policies/rego_examples/remora_action_gate.rego

      - name: Golden conformance — safety parity (hard gate)
        # Exit 1 = conformance failure, exit 2 = opa missing; both fail CI.
        # The shipped illustrative policy must always pass safety parity;
        # a full Rego port must additionally pass --strict (run it against
        # your production policy in your deployment pipeline).
        run: python scripts/opa_conformance.py

      - name: Pytest conformance gate (must run, not skip)
        # With opa on PATH the opa_gate test must actually execute; a skip
        # here would mean the harness silently lost its binary detection.
        run: |
          python -m pytest tests/test_opa_conformance_gate.py -q -rs | tee out.txt
          if grep -qi "skipped" out.txt; then
            echo "ERROR: conformance gate skipped despite opa being installed" >&2
            exit 1
          fi

  documentation-governance:
    name: Documentation governance (registers, profiles, README budget)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install PyYAML (version-locked via lockfile constraints)
        run: |
          grep -vE '^-e|^#|file://' requirements-lock.txt > /tmp/constraints.txt
          pip install pyyaml -c /tmp/constraints.txt

      - name: Documentation-governance gate
        # Registers parse and are internally consistent, document register
        # covers docs/ + paper/ + root docs exactly, canonical topics come
        # from the controlled registry, historical docs carry a banner,
        # release-profile declaration matches the profile computed from
        # register state, README stays under its line budget.
        run: python scripts/check_document_governance.py

      - name: Generated-doc drift (text generators)
        # A generated document that no longer matches its source is a silent
        # drift. These generators are stdlib/PyYAML-only, so they run in this
        # lightweight job. Figure/PDF generators are non-deterministic and are
        # not diffed. The remora-dependent failure_analysis generator is diffed
        # in quality-gates.yml (full deps).
        run: |
          python scripts/generate_research_control_matrix.py --check
          python scripts/generate_readme_status.py --check
          python scripts/generate_results_snapshot.py
          git diff --exit-code -- docs/results_snapshot.md artifacts/benchmark_summary.json

  lockfile-check:
    name: Lockfile integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify requirements-lock.txt is committed
        run: |
          if [ ! -f requirements-lock.txt ]; then
            echo "ERROR: requirements-lock.txt is missing. Run 'pip freeze > requirements-lock.txt' and commit it." >&2
            exit 1
          fi
          echo "requirements-lock.txt present ($(wc -l < requirements-lock.txt) lines)"

      - name: Verify pyproject.toml is present and parseable
        run: |
          python -c "
          import tomllib, pathlib, sys
          try:
              tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))
              print('pyproject.toml: valid TOML')
          except Exception as e:
              print(f'ERROR parsing pyproject.toml: {e}', file=sys.stderr)
              sys.exit(1)
          "

  artifact-integrity:
    name: Key artifact integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify key result artifacts exist and are non-empty
        run: |
          python - <<'PY'
          import pathlib, sys
          required = [
              "results/external_benchmark_agentharm_v1.json",
              "results/false_accept_regression_v1.json",
              "results/toolcall_blind_v3_results.json",
              "results/selective_n500_holdout_results.json",
              "results/toolcall_benchmark_v2_results.json",
              "results/m1_flag_coverage.json",
              "docs/assurance/remediation_register.yaml",
              "docs/assurance/release_gates.md",
              "docs/assurance/statistical_analysis_plan.md",
          ]
          missing = [p for p in required if not pathlib.Path(p).exists() or pathlib.Path(p).stat().st_size == 0]
          if missing:
              for p in missing:
                  print(f"MISSING or empty: {p}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(required)} required artifacts present and non-empty.")
          PY

      - name: Verify FAR fields in primary artifacts
        run: |
          python - <<'PY'
          import json, pathlib, sys
          checks = {
              "results/external_benchmark_agentharm_v1.json": "false_accept_rate",
              "results/false_accept_regression_v1.json": "false_accept_rate",
              "results/toolcall_blind_v3_results.json": "false_accept_rate",
          }
          errors = []
          for path, field in checks.items():
              p = pathlib.Path(path)
              if not p.exists():
                  errors.append(f"MISSING: {path}")
                  continue
              data = json.loads(p.read_bytes())
              if field not in data:
                  errors.append(f"Field '{field}' missing in {path}")
                  continue
              val = float(data[field])
              if val != 0.0:
                  errors.append(f"FAR = {val} (non-zero) in {path} — hard stop")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("FAR integrity check: all three primary artifacts have false_accept_rate = 0.0")
          PY
