# codegraph-index.yml
#
# Indexes this repository and uploads the result to Cloudflare D1.
# Canonical source: https://github.com/darklordVirtual/codegraph
#
# Required secrets (Settings -> Secrets -> Actions):
#   CLOUDFLARE_API_TOKEN   - CF API token (D1 write + Workers read)
#   CLOUDFLARE_ACCOUNT_ID  - CF account ID
#   D1_DATABASE_ID         - D1 database ID (wrangler d1 create codegraph)

name: CodeGraph index

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to record (leave blank for HEAD)'
        required: false
        default: ''

concurrency:
  group: codegraph-index-${{ github.repository }}
  cancel-in-progress: true

jobs:
  index:
    name: Index and upload
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install CodeGraph
        # Pinned: resolved via https://registry.npmjs.org/@colbymchenry/codegraph/latest
        # on 2026-07-20. This job runs with Cloudflare secrets — never float
        # third-party code here.
        run: npm install -g @colbymchenry/codegraph@1.4.1

      - name: Index repository
        run: codegraph init . && codegraph index .

      - name: Show index stats
        run: codegraph status .

      - name: Check Cloudflare secrets
        id: cf_secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured — skipping D1 upload"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download upload script
        if: steps.cf_secrets.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/cg-upload
          # Pinned to the codegraph repo HEAD commit resolved via
          # `git ls-remote https://github.com/darklordVirtual/codegraph HEAD`
          # on 2026-07-20 — this script runs with Cloudflare secrets, so it
          # must not float with the remote default branch.
          CG_REF="3b7522e05c6f62f4b2bbc506707a336f8c633e03"
          gh api "repos/darklordVirtual/codegraph/contents/cloudflare/scripts/upload-to-d1.mjs?ref=${CG_REF}" \
            --jq '.content' | base64 -d > /tmp/cg-upload/upload-to-d1.mjs
          gh api "repos/darklordVirtual/codegraph/contents/cloudflare/scripts/package.json?ref=${CG_REF}" \
            --jq '.content' | base64 -d > /tmp/cg-upload/package.json
          cd /tmp/cg-upload && npm install --production

      - name: Upload to D1
        if: steps.cf_secrets.outputs.configured == 'true'
        env:
          REPO: ${{ github.repository }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          GITHUB_SHA: ${{ inputs.commit_sha || github.sha }}
          DB_PATH: ${{ github.workspace }}/.codegraph/codegraph.db
        run: node /tmp/cg-upload/upload-to-d1.mjs
