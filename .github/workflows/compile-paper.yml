name: Compile Paper PDF

on:
  push:
    branches: [master]
    paths:
      - 'paper/remora_paper.tex'
      - '.github/workflows/compile-paper.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: remora_paper.tex
          working_directory: paper
          latexmk_use_xelatex: false
          extra_system_packages: "py3-pygments"

      # Layout guard: fail the build if any word protrudes into the page
      # margin or crosses the inter-column gutter (overwide tables,
      # unbreakable tokens). Prevents shipping a PDF with column overflow.
      - name: Check column/margin overflow
        run: |
          python -m pip install --quiet pymupdf
          python scripts/check_paper_overflow.py paper/remora_paper.pdf

      # Only master owns the committed PDF. Branch runs (workflow_dispatch)
      # validate compile + layout without committing, which prevents the
      # recurring binary merge conflict: every PR that touched the .tex used
      # to carry its own CI-compiled PDF that collided with the PDF the
      # master-branch run committed right after the previous merge.
      - name: Commit PDF
        if: github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: compile remora_paper.pdf from LaTeX source [skip ci]"
          file_pattern: paper/remora_paper.pdf
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
