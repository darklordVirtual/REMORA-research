name: Deploy Frontend to Cloudflare Workers

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - "scripts/build_frontend_benchmark_snapshot.py"
      - "results/**"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Pinned: latest stable release tag (bun-v1.3.14) resolved via
          # `git ls-remote --tags https://github.com/oven-sh/bun` on 2026-07-20.
          bun-version: "1.3.14"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      # Regenerate benchmark snapshot from latest result artifacts
      - name: Sync benchmark snapshot
        run: |
          # No `|| true`: a real pip failure must fail the job. The repo has no
          # requirements.txt today (the snapshot script is stdlib-only), so the
          # install is guarded on file existence instead of silently swallowed.
          if [ -f requirements.txt ]; then
            pip install --quiet -r requirements.txt
          fi
          python scripts/build_frontend_benchmark_snapshot.py
        env:
          PYTHONPATH: .

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: bun run test --reporter=verbose

      - name: Build
        working-directory: frontend
        run: bun run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Workers
        working-directory: frontend
        # wrangler pinned to the exact version resolved via
        # `npm view wrangler version` on 2026-07-20.
        run: bunx wrangler@4.112.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
