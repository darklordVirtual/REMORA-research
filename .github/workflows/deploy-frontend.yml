name: Deploy Frontend to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/build_frontend_benchmark_snapshot.py"
      - "results/**"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Regenerate benchmark snapshot from latest result artifacts
      - name: Sync benchmark snapshot
        run: |
          pip install --quiet -r requirements.txt 2>/dev/null || true
          python scripts/build_frontend_benchmark_snapshot.py
        env:
          PYTHONPATH: .

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: bun run test --reporter=verbose

      - name: Build
        working-directory: frontend
        run: bun run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Workers
        working-directory: frontend
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
