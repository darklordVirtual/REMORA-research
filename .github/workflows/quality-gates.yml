name: Quality Gates

on:
  push:
    # The repository's default branch is `master` — with `[main]` only, this
    # entire pipeline (lint, coverage, safety gate, claim gates) never ran on
    # push (2026-07-02 review finding).
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 24 bundles npm 11. The regenerated package-lock.json requires
          # npm >= 11 for `npm ci` — npm 10 (bundled with Node 22) rejects it
          # with missing @emnapi/* lock entries (verified 2026-07-20).
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          # Constraints (-c) = version pinning from requirements-lock.txt; the
          # extras drive what gets installed. Filter out -e/comment lines that
          # pip rejects in a constraints file.
          grep -vE '^-e|^#|file://' requirements-lock.txt > /tmp/constraints.txt
          pip install -e ".[dev,causal,api]" -c /tmp/constraints.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check core packages (mypy)
        run: mypy remora/policy/ remora/enforcement/ remora/selective/

      - name: Generate canonical results snapshot
        run: python scripts/generate_results_snapshot.py

      - name: Generated-doc drift (full-deps generators)
        # The v2 failure analysis imports remora.*, so it needs the installed
        # package (present in this job). A committed generated doc that no
        # longer matches its source fails here. The text-only generators are
        # additionally checked in ci.yml's documentation-governance job.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python experiments/toolcall_v2_failure_analysis.py
          git diff --exit-code -- docs/failure_analysis.md results/toolcall_benchmark_v2_failures.json

      - name: Verify claim consistency
        run: python scripts/check_claim_consistency.py

      - name: Claim provenance gate (register/artifact/manifest/doc binding)
        run: python scripts/check_claim_provenance.py

      - name: Run tests with coverage
        run: pytest -q --cov=remora --cov-report=term-missing --cov-fail-under=60

      - name: Safety gate (false accept rate must be zero)
        run: |
          python -m remora.aromer.evals.replay_runner --json | python scripts/check_safety_gate.py

      - name: Quality report
        run: python scripts/quality_report.py

      - name: Install frontend deps
        working-directory: frontend
        # The lockfile was regenerated with npm 11, which records optional
        # platform-variant deps (@emnapi/*) for all platforms, so strict,
        # lockfile-exact `npm ci` works on the Linux runner again. Requires
        # the npm 11 bundled with Node 24 above — npm 10 rejects this lockfile.
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  replay-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          # Constraints (-c) = version pinning from requirements-lock.txt; the
          # extras drive what gets installed. Filter out -e/comment lines that
          # pip rejects in a constraints file.
          grep -vE '^-e|^#|file://' requirements-lock.txt > /tmp/constraints.txt
          pip install -e ".[dev,causal,api]" -c /tmp/constraints.txt

      - name: Run heavy live replay tests
        run: |
          pytest -q -m live_replay_heavy \
            tests/test_toolcall_live_exec_results.py \
            tests/test_toolcall_live_cache_replay.py
