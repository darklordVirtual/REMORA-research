name: Update AROMER Live Status

# Publishes live AROMER telemetry to the dedicated `telemetry` branch instead
# of committing to master. The workflow never touches README.md; consumers read
# telemetry/aromer_live_status.{json,md} from the `telemetry` branch.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Fetch AROMER intelligence and render telemetry files
        run: |
          mkdir -p telemetry
          python3 << 'PYEOF'
          import urllib.request
          import json
          from datetime import datetime, timezone

          url = "https://aromer.razorsharp.workers.dev/intelligence"
          req = urllib.request.Request(url, headers={"User-Agent": "REMORA-status-bot/1.0"})
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read())
          except Exception as e:
              print(f"ERROR: failed to fetch AROMER status: {e}")
              raise SystemExit(1)

          # Raw JSON snapshot, exactly as fetched.
          with open("telemetry/aromer_live_status.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
              f.write("\n")

          current = data.get("current", {})
          aii = data.get("aii_smoothed") or current.get("aii", 0.0)
          interpretation = data.get("interpretation_smoothed") or data.get("interpretation", "UNKNOWN")
          far = current.get("false_accept_rate", 0.0)
          t1 = current.get("calibration_score", 0.0)
          t2 = current.get("friction_score", 0.0)
          t3 = current.get("metajudge_quality", 0.0)
          t4 = current.get("transfer_score", 0.0)
          t5 = current.get("stability_score", 0.0)
          ece = current.get("ece", 0.0)
          deployment = data.get("deployment_status", "SHADOW_ONLY")
          ts = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%MZ")

          # Rendered table (float-format sanitization preserved: metric values
          # are always emitted via fixed :.4f / :.1% formatting, never raw).
          section = f"""<!-- LIVE_STATUS_START -->
          > **Live AROMER telemetry** — updated every 6 hours by GitHub Actions. Last update: {ts}

          | Metric | Value | Status |
          |--------|-------|--------|
          | Autonomous Intelligence Index (AII, EMA) | {aii:.4f} | {interpretation} |
          | False accept rate (FAR) | {far:.1%} | {"Zero" if far == 0.0 else "ALERT"} |
          | Deployment mode | {deployment} | Research only |
          | T1 Calibration (ECE = {ece:.4f}) | {t1:.4f} | {"Bottleneck" if t1 < 0.70 else "Active"} |
          | T2 Friction suppression | {t2:.4f} | {"Active" if t2 >= 0.75 else "Attention"} |
          | T3 MetaJudge quality | {t3:.4f} | {"Milestone" if t3 >= 0.80 else "Active"} |
          | T4 Transfer score | {t4:.4f} | {"Max" if t4 >= 0.999 else "Active"} |
          | T5 Stability | {t5:.4f} | {"Active" if t5 >= 0.75 else "Attention"} |
          <!-- LIVE_STATUS_END -->"""

          # De-indent (heredoc indents each line)
          lines = section.split("\n")
          dedented = "\n".join(line.lstrip("          ") if line.startswith("          ") else line for line in lines)

          with open("telemetry/aromer_live_status.md", "w", encoding="utf-8") as f:
              f.write(dedented.strip() + "\n")

          print(f"Wrote telemetry: AII={aii:.4f} ({interpretation}), FAR={far:.1%}, T1={t1:.4f}, ECE={ece:.4f}")
          PYEOF

      - name: Publish to telemetry branch (never master)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Detached commit: telemetry is force-pushed to its own branch so the
          # bot never rewrites master history and never touches README.md.
          git checkout --detach
          git add telemetry/aromer_live_status.json telemetry/aromer_live_status.md
          if git diff --staged --quiet; then
            echo "No telemetry changes to publish."
          else
            git commit -m "chore(telemetry): update AROMER live status [ci skip]"
            git push origin +HEAD:telemetry
          fi
