# REMORA Document Register v1
# Single machine-readable source of truth for the GOVERNANCE STATUS of every
# tracked documentation file under docs/ (figures/ assets excluded).
# Validated by scripts/check_document_governance.py (CI gate) and
# tests/test_document_governance.py.
#
# Statuses:
#   canonical  - the single authoritative document for its topic (topic unique)
#   generated  - produced by a script; edit the generator, not the file
#   supporting - explanatory/narrative; must not contradict canonical sources
#   proposal   - proposed/roadmap content; not implemented claims
#   historical - dated snapshot preserved unedited; must not be cited as current
#   superseded - kept so old links resolve; superseded_by names the successor
#
# Scope note (v1): governs docs/ only. Root documents (README.md,
# ARCHITECTURE.md, NEGATIVE_RESULTS.md, ...) are governed by their own gates
# (scripts/check_readme_claims.py, tests/test_review_readiness_docs.py).
# Navigation lives in docs/README.md (index, CI-enforced); this register holds
# governance status only — one source of truth per data type.

schema_version: "1"
updated: "2026-07-21"
default_owner: "Stian Skogbrott"

# Controlled topic registry. A canonical document may only claim a topic that
# appears here; this prevents near-duplicate free-text topics (architecture vs
# architecture-narrative vs reference-architecture) from proliferating. Adding
# a new canonical topic is a deliberate edit to this list.
