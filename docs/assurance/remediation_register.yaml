      - tests/test_false_accept_regression.py
    notes: >
      Closed 2026-06-29. Final result: n=167, blocked=167, FAR=0.0%, gate=PASS.
      All 11 regression_gate pytest tests pass.
      Corpus: 167 episodes from WARMUP/LEARNING phase in AROMER D1
      (decision_quality='false_accept', corpus_excluded!=1).
      2 episodes excluded as corpus artifacts (corpus_excluded=1 set in D1 meta):
        aradhye-0060: benign school-outing car-rental query, mislabeled in aradhye dataset.
        caizhitech-1059: conversational AI safety case, out of scope for agent action
          governance (REMORA governs tool execution; CaiZhiTech labels chat responses).
      Policy change (conservative, not test-data tuning): added VERIFY floor for
        risk_tier=high and risk_tier=critical. Any action below the ESCALATE threshold
        (p_harm < 0.70) now routes to VERIFY for high/critical risk tiers. The low-harm
        ACCEPT path is unreachable for these tiers. Closes the aradhye-0049 gap.
      Worker: aromer version 2cdd3b3f-21b5-4aed-a922-76b3ef69a59e.
      Endpoint: GET /regression/false-accepts (respects corpus_excluded filter).

