      hash-chained, tamper-evident event log (verify_chain detects any
      modification); g4_refuses() uses the decision engine's own
      mutating/production vocabularies so hook and engine cannot drift.
      scripts/remora_hook.py gained REMORA_HOOK_PROFILE=production: implies
      fail-closed error paths and refuses every above-LOW action when the
      control plane is unreachable (G4); the research default's fail-open
      behavior is preserved as the documented local exception. Review-queue
      TTL -> ABSTAIN implemented in remora/governance/review_queue.py
      (shared with REM-033). Acceptance met: per-link partition tests,
      recovery-event tests, chain-tamper detection, and hook tests proving
      production-profile refusal under G4.

  - id: REM-033
    section: "resilience-plan §3"
    title: "Approval freshness contract — mandatory expiry + execution-time re-gate"
    gate: P4
    status: DONE
    completed: "2026-07-18"
    artifacts:
      - docs/assurance/resilience_plan_v1.md
      - remora/governance/review_queue.py
      - tests/test_review_queue.py
    notes: >
      Implemented 2026-07-18. remora/governance/review_queue.py: ReviewQueue
      with enqueue restricted to VERIFY/ESCALATE; queue-TTL expiry to
      ABSTAIN with recorded events (REM-032 item); Approval with MANDATORY
      bounded expiry (0 < ttl <= 24h - the F-2 legacy no-expiry mode does
      not exist in this API); execute() re-gate: expired approval returns
      the item to the queue (approval_expired), payload-hash mismatch is
      refused (binding_refused), and the engine re-decides on the fresh
      observation - the approval survives only an equal-or-safer world
      (monotone severity), otherwise approval_invalidated is recorded and
      the item re-queues with the stricter fresh action. All events
      hash-chained. Acceptance met: all four register criteria covered,
      including a full-lifecycle chain-verification test.

  - id: REM-034
    section: "review-2026-07-18 P1"
    title: "Atomic per-tenant audit chain in the REST/storage path"
    gate: P4
    status: DONE
    completed: "2026-07-18"
    artifacts:
      - remora/governance/tenant_chain.py
      - servers/execution_api.py
      - tests/test_execution_api.py
    notes: >
      Implemented 2026-07-18. remora/governance/tenant_chain.py:
      entry_hash = SHA256(previous_hash || canonical(payload) || tenant_id
      || sequence_no || timestamp); append() performs predecessor read,
      sequence assignment and insert atomically under one lock (fork-free
      proven by a 100-append barrier race test); per-tenant verify() at
      export/startup plus a /v1/execution/audit/verify endpoint; optional
      HMAC per entry. DURABLE ADAPTERS (2026-07-18): SQLiteTenantChain
      (single-node; BEGIN IMMEDIATE makes predecessor-read + insert one
      exclusive transaction — restart-survival and 40-append fork-free
      race proven in tests) and PostgresTenantChain (implements
      POSTGRES_DDL with SELECT FOR UPDATE on the per-tenant head row;
      contract test runs when REMORA_PG_DSN is set, skipped otherwise).
      The execution API selects the durable chain via REMORA_PG_DSN or
      REMORA_CHAIN_DB. Remaining out of scope here: durable review-queue
      and jti-consumption stores; legacy /v1/assess keeps its
      predecessor-reference records until migrated.

  - id: REM-035
    section: "review-2026-07-18 P1/P2"
    title: "End-to-end execution path: assess -> review -> re-gate -> grant -> PEP consume"
    gate: P4
    status: DONE
    completed: "2026-07-18"
    artifacts:
      - servers/execution_api.py
      - tests/test_execution_api.py
    notes: >
      Implemented 2026-07-18. servers/execution_api.py wires the state
      machine as a first-class API path (/v1/execution/*): ToolCallRequest
      carries tool name + FULL arguments hashed canonically at the
      boundary; assess issues a signed 300s execution token
      (jti/audience) on ACCEPT and enqueues VERIFY/ESCALATE into the
      per-tenant ReviewQueue; approve records the authenticated principal
      with mandatory bounded TTL; execute re-presents the full payload,
      re-gates on the fresh observation (equal-or-safer executes;
      stricter invalidates; changed args refused by binding) and issues a
      one-time grant consumed atomically by the PEP. Every transition
      appends to the REM-034 tenant chain. CAVEAT: queue and consumption
      store are in-process; durable multi-process deployment requires the
      REM-034 DDL adapter and an external jti store. The legacy
      /v1/assess+/v1/review endpoints remain for compatibility and do not
      issue grants.

