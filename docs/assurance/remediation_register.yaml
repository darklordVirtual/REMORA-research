  - id: REM-024
    section: "security-audit B"
    title: "Mandatory fail-closed policy enforcement point (PEP)"
    gate: P3
    status: IN_PROGRESS
    artifacts:
      - remora/enforcement/lease.py
      - tests/test_execution_lease.py
    notes: >
      PROGRESS 2026-07-20: library-level ExecutionLease + GovernedToolDispatcher
      implemented (remora/enforcement/lease.py). The lease is HMAC-signed over
      the full REM-024 binding set (tenant, actor, tool, canonical full-args
      hash, target environment, policy bundle hash, single-use nonce, expiry
      default 120 s); issuance raises LeaseRefused for any non-accept decision,
      and the dispatcher — which holds the tool callables, not the agent —
      recomputes the canonical args hash immediately before execution and
      consumes the nonce atomically. 22 tests, including a refusal matrix
      covering replay, expiry, not-before, per-field tampering, argument
      mutation, tenant/env/tool mismatch, unsigned, and stale policy bundle,
      plus happy-path and serialization coverage. REMAINING before DONE: durable
      multi-process nonce/lease storage (REM-025 overlap), deployment
      integration where the dispatcher fronts real downstream credentials, and
      external interception validation (REM-030, REM-021).
      Enforcement is not yet inseparable from tool execution: the local hook is
      optional and the signed-token PDP/PEP boundary (REM-013) is a library, not
      an integrated dispatcher. In-repo building blocks exist: opt-in hook
      fail-closed (REMORA_HOOK_FAIL_CLOSED, audit A-4) and full-args binding
      (PolicyObservation.tool_call_hash + canonical_tool_call_hash, audit A-5).
      DONE when a native dispatcher middleware or tool proxy issues short-lived
      signed execution leases bound to tenant, tool, canonical args hash, policy
      version, nonce, expiry, and environment, and refuses execution without a
      valid lease. The agent must not hold downstream tool credentials.

