  - id: REM-044
    section: "compendium-audit P5 / K13-4"
    title: "Path-level (trajectory) governance policies"
    gate: P4
    status: NOT_STARTED
    artifacts: []
    notes: >
      The compendium requires policies expressed over execution PATHS (sequences
      of states and actions), not single tool calls — e.g. "never external
      communication or mutation after contact with untrusted content" — a rule
      that does not exist at the call level. REMORA today gates each proposed
      call independently; the Lyapunov session tracker
      (remora/agent_hook/lyapunov_tracker.py) and drift monitor
      (remora/governance/drift_monitor.py) provide trajectory awareness but do
      not enforce path-level invariants, and the injection defence is keyword
      based (surface-derived, evadable by rewording; disclosed in the
      CLAIM-001 caveat). DONE when a taint/trajectory policy engine tracks
      untrusted-content contact across a session and blocks subsequent
      external-mutation actions, with tests and a documented evaluation.
      Deliberately NOT partially built: a half-enforced path policy would read
      as more than it is. Design only until scoped.

