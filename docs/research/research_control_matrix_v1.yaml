# REMORA Research Control Matrix v1
# Single machine-readable source of truth for the chain:
#   research source -> idea -> REMORA control -> code -> test -> evidence
#   -> maturity -> scope boundary
#
# Every `code` and `tests` path is verified to exist by
# scripts/generate_research_control_matrix.py --check and
# tests/test_research_control_matrix.py. The rendered view is
# docs/research/research_control_matrix.generated.md (regenerated, never
# hand-edited). This makes the research grounding drift-proof: a moved or
# deleted module fails CI, and the literature positioning stays in one place
# (docs/09-related-work.md is the narrative companion, this file is the map).
#
# maturity vocabulary:
#   implemented_and_tested - a REMORA module implements the idea, with tests
#   reference_design       - documented/exemplified only (no dedicated module)

schema_version: "1"
updated: "2026-07-21"

maturity_levels:
  - implemented_and_tested
  - reference_design

entries:
  - id: RES-001
    title: "Causal post-hoc explainability and concept interventions"
    source:
      citation: "Bjøru, A. R. (2026). Causal Post-hoc Explainable AI (PhD thesis), NTNU."
      sections:
        - "Paper IV §3 (concept-based externally-causal XAI)"
        - "Paper IV §4.2.1 (global explanation by dataset averaging)"
        - "Paper IV §4.2.2-§4.2.3 (Probability of Sufficiency / Necessity)"
        - "Paper IV §4.2.4 (minimal contrastive explanation search)"
      builds_on:
        - "Pearl, J. (2009). Causality (2nd ed.), ch. 9 (PS/PN definitions)."
        - "Galhotra, Pradhan & Salimi (2021), SIGMOD (contrastive explanations)."
    concepts:
      - concept_based_external_causal_xai
      - probability_of_sufficiency
      - probability_of_necessity
      - minimal_contrastive_intervention
      - global_concept_attribution
    controls:
      - causal_policy_explanation
    code:
      - remora/causal/schema.py
      - remora/causal/search.py
      - remora/causal/attribution.py
      - remora/causal/explanation.py
    tests:
      - tests/test_causal.py
      - tests/test_causal_search_attribution.py
    evidence: "PS/PN in {0,1}, minimality, verdict-change, and global mean-PS ordering are unit-tested; result carried on DecisionEnvelope.causal_explanation."
    maturity: implemented_and_tested
    scope_boundary: "Policy causality only: counterfactuals evaluated against the policy model, not the world. No real-world causal-effect or safety claim."
    related_work_section: "docs/09-related-work.md §9"

