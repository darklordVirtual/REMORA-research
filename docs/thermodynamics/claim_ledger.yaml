  evidence_semantic_verifier:
    status: not_demonstrated
    wording: |
      Semantic evidence verification quality is not demonstrated. The repository
      now includes pluggable NLIEvidenceVerifier and LLMEvidenceVerifier adapter
      classes with deterministic fallback, but no committed semantic entailment
      benchmark artifact establishes semantic verifier performance.
    artifact: remora/oracles/evidence_verifier.py
    test: tests/test_evidence_verifier.py
    limitations: |
      - No semantic entailment model is shipped in committed default flow.
      - No live evidence-evaluation benchmark artifact is committed.
      - Current default verifier remains lexical.
    date: 2026-05-25

  continual_realignment_governance:
    status: supported
    wording: |
      REMORA includes deterministic governance primitives for long-running
      agents: WorkContext telemetry, PersonaBaseline, DriftMonitor,
      MemoryGate, and ContinualRealigner. The implementation routes observable
      behavioral drift and proposed persistent memory writes through
      ACCEPT/VERIFY/ESCALATE style governance decisions. This is a structural
      and unit-tested capability, not an empirical claim that drift prediction
      is production validated.
    artifact: remora/governance/
    test: tests/test_governance_drift_monitor.py, tests/test_governance_memory_gate.py, tests/test_continual_realigner.py
    limitations: |
      - Deterministic heuristic implementation only.
      - No live long-running agent benchmark artifact is committed.
      - Does not infer consciousness, feelings, or genuine preferences.
      - Thresholds require domain calibration before production enforcement.
    date: 2026-05-27

  nested_governance_layers:
    status: supported
    wording: |
      REMORA includes a nested governance model for agentic AI memory/control
      layers. The model separates runtime_context, session_memory,
      trust_memory, evidence_memory, project_memory, policy_memory,
      audit_ledger, and architecture_baseline, each with its own update
      frequency, writability boundary, retention class, risk level, and audit
      requirement. It also includes a deterministic GovernanceForgettingDetector
      for patterns such as temporary exceptions becoming routine, ignored
      ABSTAIN/ESCALATE routes, unapproved policy overrides, and repeated
      overrides.
    artifact: remora/governance/nested_governance.py, enterprise/nested_governance_layers.yaml
    test: tests/test_nested_governance.py
    limitations: |
      - Structural governance capability only.
      - Does not train or modify foundation models.
      - Does not prove continual learning or solve catastrophic forgetting.
      - Requires live enterprise agent telemetry before empirical drift claims.
    date: 2026-05-27

  context_flow_and_memory_layers:
    status: supported
    wording: |
      REMORA includes deterministic context-flow and continuum-memory governance
      primitives for long-running agents. ContextFlowRegistry separates runtime,
      oracle, evidence, trust, policy, and audit context streams. MemoryPolicyRegistry
      separates runtime_context, session_memory, case_memory, trust_memory,
      evidence_memory, policy_memory, audit_ledger, and architecture_baseline
      with distinct update frequencies, write permissions, review requirements,
      retention classes, risk levels, and append-only boundaries.
    artifact: remora/governance/context_flow.py, remora/governance/memory_layers.py
    test: tests/test_governance_context_flow.py, tests/test_governance_memory_layers.py
    limitations: |
      - Structural governance capability only.
      - No empirical deployment telemetry validates thresholds yet.
      - Uses Nested Learning as architectural inspiration, not model-training implementation.
    date: 2026-05-27

  governance_forgetting_metrics:
    status: supported
    wording: |
      REMORA includes a deterministic GovernanceForgettingAnalyzer that routes
      policy deviation, abstention drift, escalation suppression, tool-action
      creep, memory contamination, authority-boundary violations, and temporary
      exception reuse into ACCEPT/VERIFY/ESCALATE governance actions.
    artifact: remora/governance/governance_forgetting.py
    test: tests/test_governance_forgetting_metrics.py
    limitations: |
      - Metric thresholds are heuristic defaults.
      - Requires live operational telemetry before empirical drift claims.
      - Does not prove that future agents remain aligned.
    date: 2026-05-27

  reviewed_policy_proposals:
    status: supported
    wording: |
      REMORA can generate deterministic policy-improvement proposals from
      repeated governance patterns such as model-domain failures, critical
      disagreement, false accepts, memory contamination, tool-action creep,
      abstain collapse, and insufficient evidence. Proposals require human
      review and explicitly cannot auto-apply.
    artifact: remora/governance/policy_proposals.py
    test: tests/test_governance_policy_proposals.py
    limitations: |
      - Proposal generation is rule-based.
      - No automated policy mutation is allowed.
      - Human review and external approval workflow are still required.
    date: 2026-05-27
