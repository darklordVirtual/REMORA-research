# REMORA nested governance layers
# Version: 1.0.0
#
# This file turns the "multiple memory levels" architecture into policy data.
# It is inspired by the idea that continual systems have multiple information
# flows and update frequencies, but it is used here as governance design rather
# than model training.

version: "1.0.0"
default_fail_mode: "ABSTAIN"

governance_layers:
  runtime_context:
    update_frequency: per_request
    writable_by_agent: true
    retention: short
    risk: low
    trust_boundary: request_window
    audit_required: false
    examples:
      - prompt
      - current user input
      - current tool result

  session_memory:
    update_frequency: per_session
    writable_by_agent: true
    retention: short
    risk: medium
    trust_boundary: session_scope
    audit_required: true
    examples:
      - temporary workflow state
      - current approval status
      - transient plan

  case_memory:
    update_frequency: per_case
    writable_by_agent: false
    retention: medium
    risk: high
    trust_boundary: reviewed_case_record
    audit_required: true
    examples:
      - reviewed facts
      - case-local decisions
      - approved case constraints

  trust_memory:
    update_frequency: per_decision
    writable_by_agent: false
    retention: medium
    risk: medium
    trust_boundary: evaluation_runtime
    audit_required: true
    examples:
      - model failure history
      - abstain rate
      - drift telemetry
      - unsafe execution rate

  evidence_memory:
    update_frequency: per_retrieval
    writable_by_agent: false
    retention: medium
    risk: medium
    trust_boundary: approved_evidence_connectors
    audit_required: true
    examples:
      - source references
      - retrieval hashes
      - freshness metadata
      - citation evidence
    access_control:
      # Optional ABAC layer for multi-user and multi-tenant deployments.
      # When enabled, RAG retrieval is filtered BEFORE synthesis so the LLM
      # prompt never contains documents the user is not authorised to see.
      enabled: optional                    # false | optional | required
      mechanisms:
        - name: clearance_level_filter
          description: >
            Vectorize metadata filter applied at ANN query time.
            Clearance is cumulative: 'restricted' implies access to
            'public' and 'internal' as well.
          levels: [public, internal, restricted, secret]
          storage: vectorize_metadata      # stored as clearance_level field
          enforcement: pre_retrieval       # filter before results are returned
        - name: tenant_isolation
          description: >
            Hard per-organisation boundary enforced by tenant_id metadata
            filter. All queries must match tenant_id == requester.tenant_id.
            Use separate Vectorize indices for highest-assurance isolation.
          storage: vectorize_metadata
          enforcement: pre_retrieval
        - name: acl_group_filter
          description: >
            Fine-grained group membership check applied POST-retrieval (after
            ANN search) in the Worker before context is passed to the LLM.
            Chunks whose acl_groups metadata does not intersect the user's
            groups are dropped silently.
          storage: vectorize_metadata_json_array
          enforcement: post_retrieval
      cache_partitioning:
        description: >
          KV cache keys are partitioned by clearance_level + sorted acl_groups
          + tenant_id to prevent cross-user cache leakage.
        key_prefix_format: "v2::{clearance}::{groups}::{tenant}::{query_hash}"
      data_storage:
        vectorize: clearance_level, acl_groups, tenant_id stored as vector metadata
        d1_sqlite: domain, source, title stored; clearance/tenant not yet in schema
        kv_cache: keys include identity partition; TTL 24h
      audit_events:
        - rag_query_subject
        - rag_clearance_applied
        - rag_tenant_filter
        - rag_chunks_dropped_by_acl
      implementation:
        python: remora/adapters/identity/__init__.py  # AccessContext dataclass
        oracle: remora/oracles/cloudflare_rag.py      # with_access() method
        worker: workers/rag-oracle/src/index.ts       # access field in QueryRequest
        docs: docs/nested_governance.md               # Access Control section

  project_memory:
    update_frequency: reviewed_change
    writable_by_agent: false
    retention: long
    risk: high
    trust_boundary: reviewed_repository_or_workspace
    audit_required: true
    examples:
      - architecture decisions
      - project constraints
      - accepted limitations

  policy_memory:
    update_frequency: reviewed_change
    writable_by_agent: false
    retention: long
    risk: high
    trust_boundary: governance_review
    audit_required: true
    examples:
      - authority boundaries
      - permitted actions
      - escalation rules
      - compliance rules

  audit_ledger:
    update_frequency: append_only
    writable_by_agent: false
    retention: permanent
    risk: critical
    trust_boundary: append_only_audit_store
    audit_required: true
    examples:
      - decision record
      - model output hash
      - policy version
      - approval state

  architecture_baseline:
    update_frequency: reviewed_change
    writable_by_agent: false
    retention: permanent
    risk: critical
    trust_boundary: architecture_review
    audit_required: true
    examples:
      - north-star principles
      - safety invariants
      - production boundaries

governance_forgetting_controls:
  detect:
    - temporary_exception_became_pattern
    - ignored_abstain_or_escalate
    - unapproved_policy_override
    - repeated_policy_override
  response:
    temporary_exception_became_pattern: VERIFY
    ignored_abstain_or_escalate: ESCALATE
    unapproved_policy_override: ESCALATE
    repeated_policy_override: VERIFY

tool_call_access_control:
  # Per-user and per-group tool call authorisation.
  # Controls which tools an identity is permitted to invoke.
  # Enforced in the CascadeEngine BEFORE tool execution.
  enabled: optional
  mechanisms:
    - name: role_based_tool_allowlist
      description: >
        Each tool is tagged with minimum_role required to invoke it.
        The Identity.roles set is checked against minimum_role at call time.
        Default: deny-all if no matching role.
      storage: policy_memory              # governed change, not runtime
      enforcement: pre_execution
      example:
        tool: execute_sql
        minimum_role: db_operator
        allowed_for: [db_operator, db_admin, sre]
    - name: clearance_level_tool_gate
      description: >
        Tools that access classified data require minimum clearance.
        AccessContext.clearance_level must be >= tool.minimum_clearance.
      storage: policy_memory
      enforcement: pre_execution
      example:
        tool: search_classified_documents
        minimum_clearance: restricted
    - name: tenant_scoped_tool_execution
      description: >
        Tool calls that write or read tenant-owned data are scoped by tenant_id
        from the AccessContext.  Cross-tenant calls are blocked by default.
      storage: policy_memory
      enforcement: pre_execution
  audit_events:
    - tool_call_identity
    - tool_call_permitted
    - tool_call_denied_reason
    - tool_call_tenant_scope
  data_storage:
    policy: enterprise/policy_as_code_example.yaml  # tool ACL rules
    audit: audit_ledger (append-only)
  implementation:
    identity: remora/adapters/identity/__init__.py   # AccessContext
    policy:   enterprise/policy_as_code_example.yaml
    docs:     docs/nested_governance.md              # Access Control section
