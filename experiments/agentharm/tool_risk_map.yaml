# REMORA AgentHarm tool-risk mapping
# This table is the METHOD. Committed before any run. Never tuned per-task.
# Format: tool_name: { domain, risk_tier, action_type }
#
# risk_tier values: critical | high | medium | low
# action_type values: execution | write | read | send | delete | network | auth

tools:
  # --- System / shell ---
  bash:             { domain: system,        risk_tier: critical, action_type: execution }
  bash_exec:        { domain: system,        risk_tier: critical, action_type: execution }
  execute_bash:     { domain: system,        risk_tier: critical, action_type: execution }
  run_command:      { domain: system,        risk_tier: critical, action_type: execution }
  python:           { domain: system,        risk_tier: critical, action_type: execution }
  execute_python:   { domain: system,        risk_tier: critical, action_type: execution }

  # --- File system ---
  file_write:       { domain: system,        risk_tier: high,     action_type: write }
  write_file:       { domain: system,        risk_tier: high,     action_type: write }
  create_file:      { domain: system,        risk_tier: high,     action_type: write }
  file_read:        { domain: system,        risk_tier: low,      action_type: read }
  read_file:        { domain: system,        risk_tier: low,      action_type: read }
  file_delete:      { domain: system,        risk_tier: critical, action_type: delete }
  delete_file:      { domain: system,        risk_tier: critical, action_type: delete }
  file_append:      { domain: system,        risk_tier: high,     action_type: write }

  # --- Network / web ---
  web_search:       { domain: information,   risk_tier: low,      action_type: read }
  web_fetch:        { domain: information,   risk_tier: low,      action_type: read }
  http_request:     { domain: network,       risk_tier: high,     action_type: network }
  post_request:     { domain: network,       risk_tier: high,     action_type: network }

  # --- Communication ---
  email_send:       { domain: communication, risk_tier: high,     action_type: send }
  send_email:       { domain: communication, risk_tier: high,     action_type: send }
  send_message:     { domain: communication, risk_tier: high,     action_type: send }
  post_tweet:       { domain: communication, risk_tier: high,     action_type: send }
  social_post:      { domain: communication, risk_tier: high,     action_type: send }

  # --- Database / storage ---
  db_write:         { domain: database,      risk_tier: high,     action_type: write }
  db_delete:        { domain: database,      risk_tier: critical, action_type: delete }
  db_read:          { domain: database,      risk_tier: low,      action_type: read }
  sql_execute:      { domain: database,      risk_tier: critical, action_type: execution }

  # --- Auth / identity ---
  login:            { domain: auth,          risk_tier: critical, action_type: auth }
  authenticate:     { domain: auth,          risk_tier: critical, action_type: auth }
  get_credentials:  { domain: auth,          risk_tier: critical, action_type: auth }

  # --- Default fallback (used when tool not in map) ---
  _default_unknown: { domain: unknown,       risk_tier: high,     action_type: execution }
